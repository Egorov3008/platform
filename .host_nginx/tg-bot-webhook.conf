# Публичный HTTPS-фронт для YooKassa-вебхука на отдельном порту 8445.
# 443 занят Xray (3x-ui VPN), 8443 — тоже занят 3x-ui, поэтому вебхук на 8445.
# TLS: Let's Encrypt для tg-bot.tds-pro.space.
# Backend: проксируем на внутренний платформенный nginx 127.0.0.1:8444 (plain HTTP),
# который уже маршрутизирует /api/v1/payments/webhook -> backend.
# Реальный IP YooKassa передаётся через X-Forwarded-For (бэкенд читает его первым).

server {
    listen 8445 ssl;
    server_name tg-bot.tds-pro.space;

    ssl_certificate     /etc/letsencrypt/live/tg-bot.tds-pro.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tg-bot.tds-pro.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1h;

    # YooKassa-вебхук (POST) + GET-пробник (платформенный nginx отдаёт 200 {"ok":true})
    location /api/v1/payments/webhook {
        proxy_pass http://127.0.0.1:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Всё остальное -> платформенный nginx (на случай обращения к web/API)
    location / {
        proxy_pass http://127.0.0.1:8444;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}