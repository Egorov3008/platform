services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bot/assets/schema_fixed.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
    expose:
      - "8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      BACKEND_URL: http://backend:8000
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./.env:/app/.env:ro
      - ./bot/logs:/app/logs
      - ./bot/logs_error:/app/logs_error
      - ./bot/video_instructions:/app/video_instructions:ro
      - ./shared:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  web:
    build: ./web
    restart: unless-stopped
    env_file: ./.env
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      BACKEND_URL: http://backend:8000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      BOT_TOKEN: ${BOT_TOKEN}
    command: bash /app/run.sh
    volumes:
      - ./.env:/app/.env:ro
      - ./web:/app
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx_certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  postgres_data:
