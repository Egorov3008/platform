services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./.env
    network_mode: host
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: ./.env
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env:ro
      - ./bot/logs:/app/logs
      - ./bot/logs_error:/app/logs_error
      - ./bot/video_instructions:/app/video_instructions:ro

  web:
    build: ./web
    restart: unless-stopped
    env_file: ./.env
    network_mode: host
    environment:
      BACKEND_URL: http://localhost:8000
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8001"]
    volumes:
      - ./.env:/app/.env:ro
      - ./web:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
