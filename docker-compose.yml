services:
  backend:
    build: ./backend
    restart: unless-stopped
    network_mode: host
    env_file: ./.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.env:/app/.env:ro
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  bot:
    build: ./bot
    restart: unless-stopped
    network_mode: host
    env_file: ./.env
    volumes:
      - ./.env:/app/.env:ro
      - ./bot/logs:/app/logs
      - ./bot/logs_error:/app/logs_error
      - ./bot/video_instructions:/app/video_instructions:ro

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: egorov
      POSTGRES_PASSWORD: HG8ntEEVDI7Oh/Rs
      POSTGRES_DB: vpn_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bot/assets/schema_fixed.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egorov -d vpn_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "8002:8000"
      - "8443:8443"
    environment:
      BACKEND_URL: http://backend:8000
      DATABASE_URL: postgresql://egorov:HG8ntEEVDI7Oh%2FRs@postgres:5432/vpn_bot
    command: bash /app/run.sh
    volumes:
      - ./.env:/app/.env:ro
      - ./web:/app
      - ./certs:/certs:ro
    depends_on:
      - backend
      - postgres
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
