global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'vpn-bot'
    static_configs:
      - targets: ['localhost:9101']
        labels:
          instance_name: 'vpn-bot'
          environment: 'production'
